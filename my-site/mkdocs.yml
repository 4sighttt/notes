site_name: ARCHIVE
site_url: https://4sighttt.github.io/ARCHIVE/
use_directory_urls: false

theme:
  name: material
  logo: assets/images/logo.png
  favicon: assets/images/favicon.png
  font: false
  features:
    - navigation.tracking
    - toc.follow
  palette:
    - scheme: default
      toggle:
        icon: material/weather-night
        name: night
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: sunny

copyright: 모든 내용이 인공지능에 의해 생성되었음. All content was generated by AI.

plugins:
  - search
  - awesome-pages
  
markdown_extensions:
  - nl2br
  - attr_list
  - md_in_html
  - footnotes
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  
extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - javascripts/toc_active_offset.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
