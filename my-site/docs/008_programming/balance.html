<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Balance</title>
<style>
  :root {
    --bg: #0d0f14;
    --bg-glow-a: rgba(112, 93, 255, 0.12);
    --bg-glow-b: rgba(255, 116, 97, 0.08);
    --panel: rgba(22, 25, 33, 0.88);
    --panel-border: rgba(255, 255, 255, 0.08);
    --panel-shadow: rgba(0, 0, 0, 0.45);
    --text: #ece8dc;
    --muted: #8f948f;
    --muted-strong: #b8b5aa;
    --tile: #20242d;
    --tile-border: rgba(255, 255, 255, 0.10);
    --tile-hover: #272c37;
    --heavy: #3a2024;
    --heavy-border: rgba(255, 128, 128, 0.28);
    --heavy-text: #ffd8d4;
    --light: #172538;
    --light-border: rgba(125, 171, 255, 0.28);
    --light-text: #d9e7ff;
    --accent: #f0eadc;
    --accent-dark: #12151b;
    --gold: #f2b84b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    min-height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background:
      radial-gradient(circle at 18% 12%, var(--bg-glow-a), transparent 34%),
      radial-gradient(circle at 82% 76%, var(--bg-glow-b), transparent 36%),
      linear-gradient(145deg, #090b0f 0%, var(--bg) 52%, #11141b 100%);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  .game {
    width: 100%;
    max-width: 440px;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 18px;
    padding: 24px;
    box-shadow:
      0 24px 80px var(--panel-shadow),
      inset 0 1px 0 rgba(255,255,255,0.05);
    backdrop-filter: blur(18px);
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 28px;
    padding-bottom: 14px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
  }

  .title {
    font-size: 17px;
    font-weight: 560;
    letter-spacing: 0.02em;
    color: var(--text);
  }

  .level {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .board-wrap {
    position: relative;
    padding-bottom: 26px;
  }

  .board {
    display: flex;
    justify-content: center;
    gap: 7px;
  }

  .tile {
    width: 42px;
    height: 42px;
    border: 1px solid var(--tile-border);
    border-radius: 10px;
    background: var(--tile);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 19px;
    font-weight: 560;
    cursor: pointer;
    transition:
      transform 0.18s cubic-bezier(0.4, 0, 0.2, 1),
      background 0.18s,
      border-color 0.18s,
      color 0.18s,
      box-shadow 0.18s,
      filter 0.18s;
    font-variant-numeric: tabular-nums;
    user-select: none;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.04),
      0 8px 18px rgba(0,0,0,0.18);
  }

  .tile.heavy {
    background: linear-gradient(180deg, #43252a 0%, var(--heavy) 100%);
    border-color: var(--heavy-border);
    color: var(--heavy-text);
  }

  .tile.light {
    background: linear-gradient(180deg, #1c2c43 0%, var(--light) 100%);
    border-color: var(--light-border);
    color: var(--light-text);
  }

  .tile:hover {
    background: var(--tile-hover);
    border-color: rgba(255,255,255,0.18);
    filter: brightness(1.06);
  }

  .tile.selected {
    background: var(--accent);
    color: var(--accent-dark);
    border-color: rgba(255,255,255,0.72);
    transform: translateY(-5px);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.18),
      0 0 24px rgba(240,234,220,0.22),
      0 16px 28px rgba(0,0,0,0.34);
    filter: none;
  }

  .tile.adjacent {
    border-color: rgba(240,234,220,0.60);
    box-shadow:
      inset 0 0 0 1px rgba(240,234,220,0.18),
      0 0 16px rgba(240,234,220,0.08),
      0 8px 18px rgba(0,0,0,0.20);
  }

  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); }
  }

  .tile.pop { animation: pop 0.25s ease; }

  .pivot-mark {
    position: absolute;
    width: 0;
    height: 0;
    border-left: 6px solid transparent;
    border-right: 6px solid transparent;
    border-bottom: 9px solid var(--accent);
    transform: translateX(-50%);
    transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    filter: drop-shadow(0 0 8px rgba(240,234,220,0.22));
  }

  @media (max-width: 400px) {
    .tile { width: 36px; height: 36px; font-size: 16px; }
    .game { padding: 20px; }
  }

  @media (max-width: 340px) {
    .tile { width: 32px; height: 32px; font-size: 15px; }
    .board { gap: 4px; }
  }

  .stats {
    display: flex;
    justify-content: space-between;
    margin-top: 20px;
    padding: 0 4px;
    font-size: 13px;
  }

  .stat { display: flex; gap: 6px; align-items: baseline; }
  .stat-label { color: var(--muted); letter-spacing: 0.04em; }

  .stat-value {
    font-weight: 560;
    font-variant-numeric: tabular-nums;
    color: var(--text);
  }

  .stat.optimal {
    opacity: 0;
    transition: opacity 0.25s;
  }

  .stat.optimal.revealed { opacity: 1; }

  .controls {
    display: flex;
    gap: 8px;
    margin-top: 18px;
  }

  .btn {
    flex: 1;
    padding: 12px 16px;
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 10px;
    background: #1d222c;
    font-size: 13px;
    font-weight: 560;
    color: var(--text);
    cursor: pointer;
    transition: background 0.15s, transform 0.1s, border-color 0.15s, box-shadow 0.15s;
    font-family: inherit;
    letter-spacing: 0.04em;
  }

  .btn:hover {
    background: #252b37;
    border-color: rgba(255,255,255,0.18);
  }

  .btn:active { transform: scale(0.98); }

  .btn.primary {
    background: linear-gradient(180deg, #ece7da 0%, #d9d2c1 100%);
    color: #11141a;
    border-color: rgba(255,255,255,0.40);
    box-shadow: 0 10px 24px rgba(0,0,0,0.24);
  }

  .btn.primary:hover {
    background: linear-gradient(180deg, #f8f3e8 0%, #e4dccb 100%);
  }

  .result {
    margin-top: 0;
    padding: 0 16px;
    background: rgba(255,255,255,0.045);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 12px;
    text-align: center;
    opacity: 0;
    max-height: 0;
    overflow: hidden;
    transition: opacity 0.35s, max-height 0.35s, padding 0.35s, margin-top 0.35s;
  }

  .result.show {
    opacity: 1;
    max-height: 140px;
    padding: 16px;
    margin-top: 16px;
  }

  .stars {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 8px;
  }

  .star {
    width: 26px;
    height: 26px;
    color: rgba(255,255,255,0.14);
    transition: color 0.4s, transform 0.4s, filter 0.4s;
  }

  .star.active {
    color: var(--gold);
    filter: drop-shadow(0 0 10px rgba(242,184,75,0.24));
  }

  .star.active:nth-child(1) { transition-delay: 0.05s; }
  .star.active:nth-child(2) { transition-delay: 0.2s; }
  .star.active:nth-child(3) { transition-delay: 0.35s; }
  .star.active { transform: scale(1.12); }

  .result-msg {
    font-size: 13px;
    color: var(--muted-strong);
    font-variant-numeric: tabular-nums;
  }

  .hint {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    margin-top: 14px;
    min-height: 16px;
    transition: opacity 0.2s;
  }
</style>
</head>
<body>
<div class="game">
  <div class="header">
    <div class="title">Balance</div>
    <div class="level" id="level-indicator">—</div>
  </div>

  <div class="board-wrap">
    <div class="board" id="board"></div>
    <div class="pivot-mark" id="pivot-mark"></div>
  </div>

  <div class="stats">
    <div class="stat">
      <span class="stat-label">이동</span>
      <span class="stat-value" id="swap-count">0</span>
    </div>
    <div class="stat optimal" id="optimal-stat">
      <span class="stat-label">최적</span>
      <span class="stat-value" id="min-swaps">—</span>
    </div>
  </div>

  <div class="controls">
    <button class="btn primary" id="new-btn">새 문제</button>
  </div>

  <div class="result" id="result">
    <div class="stars">
      <svg class="star" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.5l2.9 6.4 7 .7-5.3 4.7 1.6 6.8L12 17.5l-6.2 3.6 1.6-6.8L2.1 9.6l7-.7L12 2.5z"/></svg>
      <svg class="star" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.5l2.9 6.4 7 .7-5.3 4.7 1.6 6.8L12 17.5l-6.2 3.6 1.6-6.8L2.1 9.6l7-.7L12 2.5z"/></svg>
      <svg class="star" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.5l2.9 6.4 7 .7-5.3 4.7 1.6 6.8L12 17.5l-6.2 3.6 1.6-6.8L2.1 9.6l7-.7L12 2.5z"/></svg>
    </div>
    <div class="result-msg" id="result-msg"></div>
  </div>

  <div class="hint" id="hint">붉은 쪽이 무겁고, 푸른 쪽이 가볍다</div>
</div>

<script>
(function() {
  const N = 8;

  let tiles = [];
  let originalTiles = [];
  let pivot = 4;
  let swaps = 0;
  let minSwaps = 0;
  let selected = null;
  let solved = false;
  let lastSwapIndices = null;

  function randInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }

  function leftSum() {
    let s = 0;
    for (let i = 0; i < pivot; i++) s += tiles[i];
    return s;
  }
  function rightSum() {
    let s = 0;
    for (let i = pivot; i < N; i++) s += tiles[i];
    return s;
  }

  function computeMinSwaps(arr, p) {
    const n = arr.length;
    let total = 0;
    for (const v of arr) total += v;
    if (total % 2 !== 0) return null;
    const target = total / 2;
    let best = Infinity;
    const limit = 1 << n;
    for (let mask = 0; mask < limit; mask++) {
      let count = 0, s = 0;
      for (let i = 0; i < n; i++) {
        if (mask & (1 << i)) { count++; s += arr[i]; }
      }
      if (count !== p) continue;
      if (s !== target) continue;
      let inv = 0;
      for (let i = 0; i < n; i++) {
        if (!(mask & (1 << i))) {
          for (let j = i + 1; j < n; j++) {
            if (mask & (1 << j)) inv++;
          }
        }
      }
      if (inv < best) best = inv;
    }
    return best === Infinity ? null : best;
  }

  function generatePuzzle() {
    const pivotChoices = [3, 4, 4, 5];
    let attempts = 0;
    while (attempts++ < 8000) {
      const p = pivotChoices[randInt(0, pivotChoices.length - 1)];
      const t = [];
      for (let i = 0; i < N; i++) t.push(randInt(1, 7));

      let ls = 0, rs = 0;
      for (let i = 0; i < p; i++) ls += t[i];
      for (let i = p; i < N; i++) rs += t[i];
      if (ls === rs) continue;

      const ms = computeMinSwaps(t, p);
      if (ms === null) continue;
      if (ms < 2 || ms > 5) continue;

      return { tiles: t, pivot: p, minSwaps: ms };
    }
    return { tiles: [3, 1, 4, 2, 5, 2, 6, 1], pivot: 4, minSwaps: 2 };
  }

  function difficultyLabel(ms, p) {
    const offCenter = (p !== 4);
    let base;
    if (ms <= 2) base = 'Easy';
    else if (ms === 3) base = 'Normal';
    else if (ms === 4) base = 'Hard';
    else base = 'Expert';
    return offCenter ? base + ' · ' + (p + '|' + (N - p)) : base;
  }

  function startNew() {
    const puzzle = generatePuzzle();
    tiles = [...puzzle.tiles];
    originalTiles = [...puzzle.tiles];
    pivot = puzzle.pivot;
    minSwaps = puzzle.minSwaps;
    swaps = 0;
    selected = null;
    solved = false;
    lastSwapIndices = null;
    render();
  }

  function onTileClick(idx) {
    if (solved) return;
    if (selected === null) {
      selected = idx;
    } else if (selected === idx) {
      selected = null;
    } else if (Math.abs(selected - idx) === 1) {
      [tiles[selected], tiles[idx]] = [tiles[idx], tiles[selected]];
      swaps++;
      lastSwapIndices = [selected, idx];
      selected = null;
      if (leftSum() === rightSum()) solved = true;
    } else {
      selected = idx;
    }
    render();
  }

  function positionPivotMark() {
    const board = document.getElementById('board');
    const mark = document.getElementById('pivot-mark');
    const wrap = document.querySelector('.board-wrap');
    if (!board.children[pivot - 1] || !board.children[pivot]) return;
    const leftTile = board.children[pivot - 1];
    const rightTile = board.children[pivot];
    const wrapRect = wrap.getBoundingClientRect();
    const leftRect = leftTile.getBoundingClientRect();
    const rightRect = rightTile.getBoundingClientRect();
    const boardRect = board.getBoundingClientRect();
    const x = (leftRect.right + rightRect.left) / 2 - wrapRect.left;
    const y = boardRect.bottom - wrapRect.top + 5;
    mark.style.left = x + 'px';
    mark.style.top = y + 'px';
  }

  function sideTone(i, diff) {
    if (diff === 0) return '';
    const isLeft = i < pivot;
    if (diff > 0) return isLeft ? 'heavy' : 'light';
    return isLeft ? 'light' : 'heavy';
  }

  function render() {
    const board = document.getElementById('board');
    board.innerHTML = '';

    const ls = leftSum();
    const rs = rightSum();
    const diff = ls - rs;

    tiles.forEach((v, i) => {
      const el = document.createElement('div');
      const tone = solved ? '' : sideTone(i, diff);
      el.className = 'tile';
      if (tone) el.classList.add(tone);
      if (i === selected) el.classList.add('selected');
      else if (selected !== null && Math.abs(selected - i) === 1) el.classList.add('adjacent');
      if (lastSwapIndices && (i === lastSwapIndices[0] || i === lastSwapIndices[1])) {
        el.classList.add('pop');
      }
      el.textContent = v;
      el.addEventListener('click', () => onTileClick(i));
      board.appendChild(el);
    });
    lastSwapIndices = null;

    requestAnimationFrame(positionPivotMark);

    document.getElementById('swap-count').textContent = swaps;
    document.getElementById('min-swaps').textContent = solved ? minSwaps : '—';
    document.getElementById('optimal-stat').classList.toggle('revealed', solved);
    document.getElementById('level-indicator').textContent = difficultyLabel(minSwaps, pivot);

    const resultEl = document.getElementById('result');
    const stars = document.querySelectorAll('.star');
    const msgEl = document.getElementById('result-msg');
    const hintEl = document.getElementById('hint');

    if (solved) {
      resultEl.classList.add('show');
      const starCount =
        swaps <= minSwaps ? 3 :
        swaps <= minSwaps + 2 ? 2 : 1;
      stars.forEach((s, i) => {
        s.classList.toggle('active', i < starCount);
      });

      if (starCount === 3) {
        msgEl.textContent = `최적 해결 · ${swaps}회`;
      } else {
        msgEl.textContent = `${swaps}회 이동 · 최적 ${minSwaps}회`;
      }
      hintEl.style.opacity = '0';
    } else {
      resultEl.classList.remove('show');
      stars.forEach(s => s.classList.remove('active'));
      hintEl.style.opacity = '1';
      if (selected !== null) {
        hintEl.textContent = '인접한 타일을 눌러 교환하거나 같은 타일로 선택 해제';
      } else {
        hintEl.textContent = diff === 0
          ? '균형'
          : '붉은 쪽이 무겁고, 푸른 쪽이 가볍다';
      }
    }
  }

  document.getElementById('new-btn').addEventListener('click', startNew);
  window.addEventListener('resize', positionPivotMark);

  startNew();
})();
</script>
</body>
</html>
